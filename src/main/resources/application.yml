spring:
  application:
    name: ai-content-creator

# AI 配置
ai:
  provider: openai          # openai / claude / kimi / deepseek
  api-key: ${AI_API_KEY:your_api_key_here}
  base-url: ${AI_BASE_URL:https://api.openai.com/v1}
  model: ${AI_MODEL:gpt-4o-mini}
  temperature: 0.7
  max-tokens: 2000

# 内容配置
content:
  platform: weitoutiao    # weitoutiao / maimai / zhihu
  target-audience: "30-50岁男性，互联网从业者"
  daily-topic-count: 5
  article-length:
    weitoutiao:
      min: 300
      max: 800
    maimai:
      min: 800
      max: 2000

# 热点源配置
hotspot:
  sources:
    zhihu:
      url: "https://www.zhihu.com/api/v3/feed/topstory/hot-lists/total"
      enabled: true
    weibo:
      url: "https://weibo.com/ajax/side/hotSearch"
      enabled: true

# 敏感词
sensitive-words:
  - 政治敏感词
  - 色情
  - 暴力
  - 赌博
  - 绝对化用语
  - 第一
  - 最好

# 定时任务
scheduler:
  daily-cron: "0 30 8 * * *"   # 每天 8:30 执行
  enabled: true                  # 定时任务开关，CLI模式可设为 false

# 应用配置
app:
  data-dir: ${user.home}/.ai-content-creator
  publishing:
    output-dir: ${app.data-dir}/output
    webhook-url:                 # RPA webhook 通知地址，可选

# 多领域配置
domain:
  domains:
    foreign-news:
      enabled: true
      label: "外网热点"
      collector: ai_web_scrape
      persona: "国际新闻观察者，视角客观冷静"
      platforms:
        - weitoutiao
        - maimai
      article-count: 3
      length:
        min: 100
        max: 200
      cta-type: comment
      sources:
        - url: "https://www.bbc.com"
          type: webpage
        - url: "https://www.zaobao.com"
          type: webpage
        - url: "https://www.foxnews.com"
          type: webpage
        - url: "https://edition.cnn.com"
          type: webpage
        - url: "https://www.aljazeera.com"
          type: webpage
    it-hot:
      enabled: true
      label: "IT热点"
      collector: rss_feed
      persona: "资深程序员，经验丰富，语言犀利"
      platforms:
        - maimai
      article-count: 3
      length:
        min: 100
        max: 200
      cta-type: follow
      sources:
        - url: "https://github.com/trending"
          type: rss
        - url: "https://news.ycombinator.com/rss"
          type: rss
        - url: "https://www.v2ex.com/feed/tab/tech.xml"
          type: rss
        - url: "https://www.36kr.com/feed"
          type: rss
        - url: "https://sspai.com/feed"
          type: rss
    lifestyle:
      enabled: true
      label: "生活热点"
      collector: hot_filter
      persona: "懂生活的过来人，温暖接地气"
      platforms:
        - weitoutiao
        - maimai
      article-count: 3
      length:
        min: 100
        max: 200
      cta-type: share
      keywords:
        - 家庭
        - 育儿
        - 美食
        - 旅游
        - 健康
        - 情感
      excludeKeywords:
        - 政治
        - 军事
        - 灾难
